services:
  backend:
    container_name: sec_cafe_backend
    image: sec_cafe_backend:1.0
    environment:
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4
    volumes:
      - ./backend:/app
      - /etc/localtime:/etc/localtime
    networks:
      - ui

networks:
  ui:
    driver: bridge
